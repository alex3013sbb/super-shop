spring:
  application:
    name: shopsystem
  datasource:
    url: jdbc:postgresql://localhost:5432/alexshop
    username: alex
    password: secret
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
  flyway:
    enabled: true
    locations: classpath:db/migration
  jpa:
    show-sql: true
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
        ddl:
          auto: none