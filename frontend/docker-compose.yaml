services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: super-shop-frontend
    ports:
      - "3000:3000"
    volumes:
      - .:/app
      - /app/node_modules
      - /app/.next
    environment:
      - NODE_ENV=development
      - NEXT_TELEMETRY_DISABLED=1 # disable telemetry
      - WATCHPACK_POLLING=true # actively chec for changes
